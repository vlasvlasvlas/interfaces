<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interfaces | vlasvlasvlas</title>
    <meta
      name="description"
      content="Galeria simple de interfaces visuales, sonoras e interactivas de vlasvlasvlas."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">vlasvlasvlas</p>
        <h1>Interfaces</h1>
      </div>

      <div class="toolbar" aria-label="Controles de galeria">
        <label class="search">
          <span>Buscar</span>
          <input id="search" type="search" autocomplete="off" placeholder="synth, mapa, terminal..." />
        </label>
        <div id="filters" class="filters" role="list" aria-label="Filtros"></div>
      </div>
    </header>

    <main>
      <section class="summary" aria-live="polite">
        <p id="project-count">Cargando interfaces...</p>
        <a class="data-link" href="data/interfaces.yaml">Editar YAML</a>
      </section>

      <section id="gallery" class="gallery" aria-label="Galeria de proyectos"></section>
      <p id="empty-state" class="empty-state" hidden>No hay proyectos para ese filtro.</p>
    </main>

    <footer>
      <p>Datos mantenidos en <code>data/interfaces.yaml</code>.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
