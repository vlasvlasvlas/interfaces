projects:
  - title: Verdysynth
    description: Instrumento de audio vectorial para navegador. Genera formas de onda XY simulando un osciloscopio CRT.
    description_en: Vector audio instrument for browser. Generates XY waveforms simulating a CRT oscilloscope.
    repo: https://github.com/vlasvlasvlas/verdysynth
    demo: https://vlasvlasvlas.github.io/verdysynth/
    image: imgs/verdysynth.png

  - title: Incysynth
    description: Aplicacion web interactiva que interpreta "In C" de Terry Riley utilizando datos en tiempo real de APIs publicas.
    description_en: Interactive web app that interprets Terry Riley's "In C" using real-time data from public APIs.
    repo: https://github.com/vlasvlasvlas/incysynth
    demo: https://vlasvlasvlas.github.io/incysynth/
    image: imgs/incysynth.png

  - title: Fractal Synth
    description: Sintetizador generativo web basado en Chaos Game, donde vertices geometricos disparan notas, fractales y efectos en tiempo real.
    description_en: Generative web synth based on the Chaos Game, where geometric vertices trigger notes, fractals and real-time effects.
    repo: https://github.com/vlasvlasvlas/fractalsynth
    demo: https://vlasvlasvlas.github.io/fractalsynth/
    image: imgs/fractalsynth.png

  - title: Text2Synth
    description: Sintetizador retro de texto a voz con interfaz tipo terminal, backend Flask y motor Web Audio multipista.
    description_en: Retro text-to-voice synthesizer with a terminal-style interface, Flask backend and multichannel Web Audio engine.
    repo: https://github.com/vlasvlasvlas/text2synth
    image: imgs/text2synth.png

  - title: CitySynth
    description: Secuenciador audiovisual generativo en arte ASCII, con edificios-canal, barridos, clima y audio chiptune.
    description_en: Generative audiovisual sequencer in ASCII art, with building-channels, sweeps, weather and chiptune audio.
    repo: https://github.com/vlasvlasvlas/citysynth
    demo: https://vlasvlasvlas.github.io/citysynth/
    image: imgs/citysynth.png

  - title: VOZ-A-COSA
    description: Interfaz web que convierte voz cantada, tarareada o silbada en MIDI, sintesis e instrumentos exportables.
    description_en: Web interface that turns sung, hummed or whistled voice into MIDI, synthesis and exportable instruments.
    repo: https://github.com/vlasvlasvlas/vozacosa
    image: imgs/vozacosa.png

  - title: Cupdance
    description: Interfaz coreografica con vision computacional que convierte movimiento corporal y rotacion de vasos en paisaje audiovisual.
    description_en: Choreographic computer-vision interface that turns body movement and cup rotation into an audiovisual soundscape.
    repo: https://github.com/vlasvlasvlas/cupdance
    image: imgs/cupdance.png

  - title: ChessDrum
    description: Secuenciador de bateria donde un tablero de ajedrez fisico o virtual controla patrones, mixer, filtros y MIDI.
    description_en: Drum sequencer where a physical or virtual chessboard controls patterns, mixer, filters and MIDI.
    repo: https://github.com/vlasvlasvlas/chessdrum
    image: imgs/chessdrum.png

  - title: Therecam
    description: Theremin por webcam con deteccion de manos, antenas virtuales, control de pitch, volumen, vibrato y delay.
    description_en: Webcam theremin with hand detection, virtual antennas, pitch, volume, vibrato and delay control.
    repo: https://github.com/vlasvlasvlas/therecam
    demo: https://youtu.be/lhVT2A8Nzn8
    image: imgs/therecam.png

  - title: AstroSynth
    description: Secuenciador orbital inspirado en un orrery, donde el movimiento de los planetas genera eventos sonoros.
    description_en: Orbital sequencer inspired by an orrery, where the movement of the planets generates sonic events.
    repo: https://github.com/vlasvlasvlas/astrosynth
    demo: https://vlasvlasvlas.github.io/astrosynth/
    image: imgs/astrosynth.png

  - title: ShellSynth
    description: Instrumento web donde la forma dibujada funciona como timbre y gesto sonoro.
    description_en: Web instrument where the drawn shape works as timbre and sonic gesture.
    repo: https://github.com/vlasvlasvlas/shellsynth
    demo: https://vlasvlasvlas.github.io/shellsynth/
    image: imgs/shellsynth.png

  - title: PixelSynth
    description: Pixel art musical y emulador interactivo de creacion sonora random.
    description_en: Musical pixel art and interactive random sound creation emulator.
    repo: https://github.com/vlasvlasvlas/pixelsynth
    demo: https://vlasvlasvlas.github.io/pixelsynth/
    image: imgs/pixelsynth.png

  - title: DVDLogoSynth
    description: Logos DVD rebotando como voces visuales y sonoras con color, trayectoria, timbre y drone.
    description_en: Bouncing DVD logos as visual and sonic voices with color, trajectory, timbre and drone.
    repo: https://github.com/vlasvlasvlas/dvdlogosynth
    demo: https://vlasvlasvlas.github.io/dvdlogosynth/
    image: imgs/dvdlogosynth.png

  - title: ZenonSynth
    description: Instrumento audiovisual basado en la paradoja de Zenon, convergencia asintotica y sintesis modular.
    description_en: Audiovisual instrument based on Zeno's paradox, asymptotic convergence and modular synthesis.
    repo: https://github.com/vlasvlasvlas/zenonsynth
    demo: https://vlasvlasvlas.github.io/zenonsynth/
    image: imgs/zenonsynth.png

  - title: WeatherSynth
    description: Instrumento atmosferico que convierte clima, viento, lluvia, humedad y hora en escena visual-sonora.
    description_en: Atmospheric instrument that converts weather, wind, rain, humidity and time into a visual-sonic scene.
    repo: https://github.com/vlasvlasvlas/weathersynth
    demo: https://vlasvlasvlas.github.io/weathersynth/
    image: imgs/weathersynth.png

  - title: Morsimon
    description: Juego interactivo que cruza codigo Morse con la logica del clasico Simon.
    description_en: Interactive game that crosses Morse code with classic Simon logic.
    repo: https://github.com/vlasvlasvlas/morsimon
    demo: https://vlasvlasvlas.github.io/morsimon/
    image: imgs/morsimon.png

  - title: Araria
    description: Animacion interactiva con movimiento procedural y audio de horror generado en navegador.
    description_en: Interactive animation with procedural movement and browser-generated horror audio.
    repo: https://github.com/vlasvlasvlas/araria
    demo: https://vlasvlasvlas.github.io/araria/
    image: imgs/araria.png

  - title: Estrellados
    description: Cielo visible en tiempo real convertido en partitura performativa con arpegios, drones y estrellas seleccionables.
    description_en: Real-time visible sky turned into a performative score with arpeggios, drones and selectable stars.
    repo: https://github.com/vlasvlasvlas/estrellados
    demo: https://vlasvlasvlas.github.io/estrellados/
    image: imgs/estrellados.png

  - title: Trenfase
    description: Secuenciador audiovisual interactivo inspirado en la Yamanote Line de Tokio.
    description_en: Interactive audiovisual sequencer inspired by Tokyo's Yamanote Line.
    repo: https://github.com/vlasvlasvlas/trenfase
    demo: https://vlasvlasvlas.github.io/trenfase/
    image: imgs/trenfase.jpg

  - title: Botonera
    description: Sample trigger, grabador, procesador de efectos y looper en navegador con Web Audio API.
    description_en: Sample trigger, recorder, effects processor and looper in the browser with Web Audio API.
    repo: https://github.com/vlasvlasvlas/botonera
    demo: https://vlasvlasvlas.github.io/botonera/
    image: imgs/botonera.png

  - title: NightTowers
    description: Nueve torres y nueve estrellas forman una red laser guiada por sintesis electroacustica.
    description_en: Nine towers and nine stars form a laser network guided by electroacoustic synthesis.
    repo: https://github.com/vlasvlasvlas/nighttowers
    demo: https://vlasvlasvlas.github.io/nighttowers/
    image: imgs/nighttowers.png

  - title: Text2Wind
    description: El texto se convierte en viento, sonido y silencio con tipografia viva, cielo procedural y capas sonoras.
    description_en: Text becomes wind, sound and silence with living typography, procedural sky and sonic layers.
    repo: https://github.com/vlasvlasvlas/text2wind
    demo: https://vlasvlasvlas.github.io/text2wind/
    image: imgs/text2wind.png

  - title: SynthClock
    description: Instrumento musical generativo basado en el Tone Clock, donde el tiempo produce notas y visuales.
    description_en: Generative musical instrument based on the Tone Clock, where time produces notes and visuals.
    repo: https://github.com/vlasvlasvlas/synthclock
    demo: https://vlasvlasvlas.github.io/synthclock/
    image: imgs/synthclock.jpg

  - title: DrawDron
    description: Instrumento generativo de drones donde dibujar en canvas produce musica y visuales fractales.
    description_en: Generative drone instrument where drawing on canvas produces music and fractal visuals.
    repo: https://github.com/vlasvlasvlas/drawdron
    image: imgs/drawdron.jpg

  - title: Botovejero
    description: Sampler audiovisual web sobre una playlist de ropavejeros, con pads, efectos y modulacion en vivo.
    description_en: Web audiovisual sampler over a street vendor playlist, with pads, effects and live modulation.
    repo: https://github.com/vlasvlasvlas/botovejero
    demo: https://vlasvlasvlas.github.io/botovejero/
    image: imgs/botovejero.png

  - title: Therescreen
    description: Instrumento tipo theremin para Mac que usa apertura y cierre de tapa como control continuo de pitch.
    description_en: Theremin-like instrument for Mac that uses lid opening and closing as continuous pitch control.
    repo: https://github.com/vlasvlasvlas/therescreen
    image: imgs/therescreen.png

  - title: Itoshima Sound
    description: Pieza web sonora sobre paisajes rurales, ritmos cotidianos y sonidos de Itoshima.
    description_en: Web sound piece about rural landscapes, daily rhythms and sounds of Itoshima.
    repo: https://github.com/vlasvlasvlas/itoshima_sound
    demo: https://vlasvlasvlas.github.io/itoshima_sound/
    image: imgs/itoshima_sound.jpg

  - title: YTBMusic
    description: Reproductor terminal de YouTube Music con playlists, skins ASCII, descarga, streaming y buffering.
    description_en: Terminal YouTube Music player with playlists, ASCII skins, download, streaming and buffering.
    repo: https://github.com/vlasvlasvlas/ytbmusic
    image: imgs/ytbmusic.jpg

  - title: Rollito Juegos
    description: Fanzine web de software termico y juegos, publicado como experiencia navegable.
    description_en: Web fanzine of thermal software and games, published as a navigable experience.
    repo: https://github.com/vlasvlasvlas/rollitojuegos
    demo: https://vlasvlasvlas.github.io/rollitojuegos/
    image: imgs/rollitojuegos.png

  - title: Colormic
    description: Interfaz web compacta para experimentar con color, sonido y captura en navegador.
    description_en: Compact web interface to experiment with color, sound and capture in the browser.
    repo: https://github.com/vlasvlasvlas/colormic
    demo: https://vlasvlasvlas.github.io/colormic/
    image: imgs/colormic.png

  - title: SpankSynth
    description: Sintetizador web con interfaz de nalgadas donde el golpe controla el sonido.
    description_en: Web synthesizer with a spanking interface where the hit controls the sound.
    repo: https://github.com/vlasvlasvlas/spank
    demo: https://vlasvlasvlas.github.io/spank/
    image: imgs/spank.png

  - title: Theremac
    description: Theremin virtual para Mac controlado por el angulo de apertura de la tapa del laptop.
    description_en: Virtual theremin for Mac controlled by the laptop lid opening angle.
    repo: https://github.com/vlasvlasvlas/theremac
    image: imgs/theremac.png
  - title: RubikSynth
    description: Cubos de Rubik 2D que se resuelven solos generando musica en tiempo real.
    description_en: Self-solving 2D Rubik cubes that generate music in real time.
    repo: https://github.com/vlasvlasvlas/rubiksynth
    demo: https://vlasvlasvlas.github.io/rubiksynth/
    image: imgs/rubiksynth.png

  - title: BriSynth
    description: Instrumento musical interactivo. Cuerdas de yute tensadas entre rejas de un balcon de ciudad generan sonido.
    description_en: Interactive musical instrument. Jute strings stretched across iron balcony railings generate sound.
    repo: https://github.com/vlasvlasvlas/brisynth
    demo: https://vlasvlasvlas.github.io/brisynth/
    image: imgs/brisynth.png

  - title: Triomino Generator
    description: Generador automatico de piezas y tableros para el juego de triominos.
    description_en: Automatic piece and board generator for the triomino game.
    repo: https://github.com/vlasvlasvlas/triomino-generator
    image: imgs/triomino-generator.png

  - title: TostaTetris
    description: Tetris colaborativo controlado con una tostadora hackeada como interfaz fisica.
    description_en: Collaborative Tetris controlled with a hacked toaster as a physical interface.
    repo: https://github.com/vlasvlasvlas/tostatetris
    image: imgs/tostatetris.png

  - title: Motion Deja Vu
    description: Maquina de loops de animacion slit construida con hardware Lego hackeado y Kotlin.
    description_en: Slit animation loop machine built with hacked Lego hardware and Kotlin.
    repo: https://github.com/vlasvlasvlas/motion-deja-vu
    image: imgs/motion-deja-vu.jpg

  - title: 3dPlotMyCamera
    description: Renderiza en tiempo real la imagen de la webcam como grafico de area 3D.
    description_en: Renders the live webcam image as a real-time 3D area chart.
    repo: https://github.com/vlasvlasvlas/3dPlotMyCamera
    image: imgs/3dploymycamera.png
